<!-- 
ANYWAY FLOOR 聊天机器人 Widget
直接复制这段代码到你的网站 HTML 中
-->

<div id="chatbot-widget-container"></div>

<script>
(function() {
  // 配置
  const CONFIG = {
    apiUrl: 'http://localhost:8000', // 改为你的后端地址
    title: '🤖 ANYWAY FLOOR 助手',
    placeholder: '请输入你的问题...',
    welcomeMessage: '欢迎！我是 ANYWAY FLOOR 的智能助手，有什么可以帮你的吗？'
  };

  // 创建样式
  const style = document.createElement('style');
  style.textContent = `
    #chatbot-widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 380px;
      height: 600px;
      border-radius: 12px;
      box-shadow: 0 5px 40px rgba(0, 0, 0, 0.16);
      background: white;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      z-index: 9999;
      overflow: hidden;
    }

    #chatbot-widget.minimized {
      height: 60px;
      width: 60px;
    }

    #chatbot-widget.minimized #chatbot-messages,
    #chatbot-widget.minimized #chatbot-input-area {
      display: none;
    }

    #chatbot-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    #chatbot-header h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    #chatbot-minimize-btn {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      padding: 0;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #chatbot-minimize-btn:hover {
      opacity: 0.8;
    }

    #chatbot-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f8f9fa;
    }

    .chatbot-message {
      display: flex;
      gap: 8px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chatbot-message.user {
      justify-content: flex-end;
    }

    .chatbot-message-content {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .chatbot-message.assistant .chatbot-message-content {
      background: white;
      color: #333;
      border: 1px solid #e0e0e0;
    }

    .chatbot-message.user .chatbot-message-content {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .chatbot-message.system .chatbot-message-content {
      background: #fff3cd;
      color: #856404;
      font-size: 12px;
      text-align: center;
      max-width: 100%;
    }

    #chatbot-input-area {
      padding: 12px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      background: white;
    }

    #chatbot-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    #chatbot-input:focus {
      border-color: #667eea;
    }

    #chatbot-send-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #chatbot-send-btn:hover {
      opacity: 0.9;
    }

    #chatbot-send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .chatbot-loading {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .chatbot-loading span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #667eea;
      animation: bounce 1.4s infinite;
    }

    .chatbot-loading span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .chatbot-loading span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        opacity: 0.5;
        transform: translateY(0);
      }
      40% {
        opacity: 1;
        transform: translateY(-8px);
      }
    }

    @media (max-width: 480px) {
      #chatbot-widget {
        width: 100%;
        height: 100%;
        bottom: 0;
        right: 0;
        border-radius: 0;
      }

      #chatbot-widget.minimized {
        width: 60px;
        height: 60px;
        bottom: 20px;
        right: 20px;
        border-radius: 50%;
      }
    }
  `;
  document.head.appendChild(style);

  // 创建 HTML
  function createWidget() {
    const container = document.getElementById('chatbot-widget-container');
    
    const widget = document.createElement('div');
    widget.id = 'chatbot-widget';
    widget.innerHTML = `
      <div id="chatbot-header">
        <h3>${CONFIG.title}</h3>
        <button id="chatbot-minimize-btn">−</button>
      </div>
      <div id="chatbot-messages"></div>
      <div id="chatbot-input-area">
        <input 
          type="text" 
          id="chatbot-input" 
          placeholder="${CONFIG.placeholder}"
          autocomplete="off"
        />
        <button id="chatbot-send-btn">发送</button>
      </div>
    `;
    
    container.appendChild(widget);
    return widget;
  }

  // 初始化
  function init() {
    const widget = createWidget();
    const messagesDiv = document.getElementById('chatbot-messages');
    const inputField = document.getElementById('chatbot-input');
    const sendBtn = document.getElementById('chatbot-send-btn');
    const minimizeBtn = document.getElementById('chatbot-minimize-btn');
    let sessionId = null;

    // 欢迎消息
    addMessage(CONFIG.welcomeMessage, 'assistant');

    // 最小化按钮
    minimizeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      widget.classList.toggle('minimized');
      minimizeBtn.textContent = widget.classList.contains('minimized') ? '+' : '−';
    });

    // 发送消息
    async function sendMessage() {
      const message = inputField.value.trim();
      if (!message) return;

      inputField.value = '';
      addMessage(message, 'user');
      sendBtn.disabled = true;

      try {
        // 发送到后端
        const response = await fetch(`${CONFIG.apiUrl}/api/chat/stream`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            message: message,
            session_id: sessionId
          })
        });

        if (!response.ok) throw new Error('请求失败');

        // 处理流式响应
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullResponse = '';
        let messageElement = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                
                if (data.event === 'meta') {
                  sessionId = data.data.session_id;
                } else if (data.event === 'token') {
                  fullResponse += data.data;
                  
                  if (!messageElement) {
                    messageElement = addMessage('', 'assistant');
                  }
                  messageElement.querySelector('.chatbot-message-content').textContent = fullResponse;
                  messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
              } catch (e) {
                // 忽略解析错误
              }
            }
          }
        }
      } catch (error) {
        console.error('错误:', error);
        addMessage('抱歉，出现了错误。请稍后重试。', 'system');
      } finally {
        sendBtn.disabled = false;
        inputField.focus();
      }
    }

    // 添加消息
    function addMessage(text, role) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `chatbot-message ${role}`;
      messageDiv.innerHTML = `
        <div class="chatbot-message-content">${escapeHtml(text)}</div>
      `;
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      return messageDiv;
    }

    // 转义 HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 事件监听
    sendBtn.addEventListener('click', sendMessage);
    inputField.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  }

  // 页面加载完成后初始化
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
