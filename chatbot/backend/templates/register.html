<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>注册 - Anyway Flooring</title>
<style>
  :root { --brand:#2563eb; --bg:#f5f7fb; --border:#dfe3ea; --err:#dc2626; --ok:#16a34a; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
         background:var(--bg); display:flex; min-height:100vh; align-items:center; justify-content:center; padding:24px; }
  .card { background:#fff; width:100%; max-width:420px; padding:36px 32px; border-radius:14px;
          box-shadow:0 8px 28px rgba(15,23,42,0.08); }
  h1 { margin:0 0 4px; font-size:22px; color:#0f172a; }
  p.sub { margin:0 0 24px; color:#64748b; font-size:14px; }
  label { display:block; font-size:13px; color:#334155; margin:14px 0 6px; }
  input { width:100%; padding:11px 12px; border:1px solid var(--border); border-radius:8px;
          font-size:14px; outline:none; transition:border .15s; }
  input:focus { border-color:var(--brand); }
  button { margin-top:22px; width:100%; padding:12px; border:none; border-radius:8px;
           background:var(--brand); color:#fff; font-size:15px; cursor:pointer; }
  button:disabled { opacity:.6; cursor:not-allowed; }
  .msg { margin-top:14px; font-size:13px; min-height:18px; }
  .msg.err { color:var(--err); }
  .msg.ok  { color:var(--ok); }
  .foot { margin-top:18px; text-align:center; font-size:13px; color:#64748b; }
  .foot a { color:var(--brand); text-decoration:none; }
</style>
</head>
<body>
  <div class="card">
    <h1>创建账号</h1>
    <p class="sub">填写下面的信息完成注册，我们会发一封验证邮件到你的邮箱。</p>
    <form id="form">
      <label for="name">姓名</label>
      <input id="name" name="name" required maxlength="80" />

      <label for="email">邮箱</label>
      <input id="email" name="email" type="email" required />

      <label for="phone">电话</label>
      <input id="phone" name="phone" required placeholder="例如 +86 138 0000 0000" />

      <label for="password">密码</label>
      <input id="password" name="password" type="password" required minlength="6" />

      <button id="submit" type="submit">注册</button>
      <div id="msg" class="msg"></div>
    </form>
    <div class="foot">已有账号？<a href="/login">去登录</a></div>
  </div>

<script>
const form = document.getElementById('form');
const msg = document.getElementById('msg');
const btn = document.getElementById('submit');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.className = 'msg';
  msg.textContent = '';
  btn.disabled = true;
  const data = Object.fromEntries(new FormData(form).entries());
  try {
    const r = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.detail || '注册失败');
    msg.className = 'msg ok';
    msg.textContent = j.message || '注册成功，请查收验证邮件。';
    form.reset();
  } catch (err) {
    msg.className = 'msg err';
    msg.textContent = err.message;
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
